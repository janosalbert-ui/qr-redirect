<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Rekord</title>

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:20px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
}
</style>

</head>

<body>

<div class="card" id="content">
Betöltés...
</div>

<script>

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const sheetID = "1KMk0MY4LVv3XQCWbBVsN_csA9lU6wouzRxcGbK6xUYg";
const sheetName = "QRtábla";

const url = `https://opensheet.elk.sh/${sheetID}/${sheetName}`;

fetch(url)
.then(res => res.json())
.then(data => {

const record = data.find(r => r.ID === id);

if(!record){
document.getElementById("content").innerHTML = "Nincs találat";
return;
}

document.getElementById("content").innerHTML = `
<h2>Rekord adatai</h2>
<p><b>ID:</b> ${record.ID}</p>
<p><b>Megnevezés:</b> ${record.Megnevezés}</p>
<p><b>Mennyiség:</b> ${record.menny}</p>
<p><b>Egység:</b> ${record["menny. egys"]}</p>
<p><b>Egységár:</b> ${record["egys. ár"]}</p>
`;

});

</script>

</body>
</html>
