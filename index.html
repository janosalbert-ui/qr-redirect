<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Furniture info</title>

<style>

body{
font-family:Arial;
padding:20px;
background:#f5f5f5;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
max-width:500px;
margin:auto;
}

img{
width:100%;
max-width:400px;
margin-top:10px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="card">

<h2>Furniture info</h2>

<div id="content">
Betöltés...
</div>

</div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbzEZ7XTu06ejB4AeS_Q-esWeiGokVJrlPCobWii-rZhW83Jpi7GV4f8WgE8aMnxXB0S/exec";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

function showData(data){

if(!data || data.error){

document.getElementById("content").innerHTML =
"Nincs találat a rekordra.";

return;

}

let html = "";

html += "<p><b>ID:</b> "+data.id+"</p>";
html += "<p><b>Date:</b> "+data.date+"</p>";
html += "<p><b>Furniture:</b> "+data.furniture+"</p>";
html += "<p><b>Component:</b> "+data.component+"</p>";
html += "<p><b>Unit:</b> "+data.unit+"</p>";
html += "<p><b>Quantity:</b> "+data.qty+"</p>";

if(data.photo1) html += "<img src='"+data.photo1+"'>";
if(data.photo2) html += "<img src='"+data.photo2+"'>";
if(data.photo3) html += "<img src='"+data.photo3+"'>";
if(data.photo4) html += "<img src='"+data.photo4+"'>";
if(data.photo5) html += "<img src='"+data.photo5+"'>";

document.getElementById("content").innerHTML = html;

}

if(id){

const script = document.createElement("script");

script.onerror = function(){
document.getElementById("content").innerHTML =
"Hiba a lekérdezésnél.";
};

script.src =
SCRIPT_URL + "?id=" + id + "&callback=showData";

document.body.appendChild(script);

}
else{

document.getElementById("content").innerHTML =
"Nincs ID paraméter.";

}

</script>

</body>
</html>
