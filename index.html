<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Package info</title>

<style>

body{
font-family:Arial;
padding:20px;
background:#f5f5f5;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
max-width:600px;
margin:auto;
}

.gallery{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:10px;
margin-top:20px;
}

.gallery img{
width:100%;
border-radius:6px;
cursor:pointer;
}

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.85);
display:none;
align-items:center;
justify-content:center;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:8px;
}

</style>

</head>

<body>

<div class="card">

<h2>Package info</h2>

<div id="content">
Betöltés...
</div>

</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
<img id="lightboxImg">
</div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbxVCRizgW3QG3x0eMRjwOVX2aioyc6wFOhJQ-_93_ClDF59jie3U-C1POeX6joLnFKm/exec";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

/* ===== Drive link javítás ===== */

function convertDriveLink(url){

if(!url) return "";

let fileId = "";

/* id= */
let m1 = url.match(/id=([^&]+)/);
if(m1) fileId = m1[1];

/* file/d/ */
let m2 = url.match(/\/d\/([^\/]+)/);
if(!fileId && m2) fileId = m2[1];

if(fileId){
return "https://lh3.googleusercontent.com/d/" + fileId;
}

return "";

}

/* ===== nagy kép ===== */

function openLightbox(src){

document.getElementById("lightboxImg").src = src;
document.getElementById("lightbox").style.display="flex";

}

function closeLightbox(){

document.getElementById("lightbox").style.display="none";

}

/* ===== adat betöltés ===== */

async function loadData(){

if(!id){
document.getElementById("content").innerHTML="Nincs ID paraméter.";
return;
}

try{

const response = await fetch(SCRIPT_URL+"?id="+id);
const data = await response.json();

if(data.error){
document.getElementById("content").innerHTML="Nincs adat a rekordra.";
return;
}

let html="";

html+="<p><b>Master Package ID:</b> "+(data.master_package_id||"-")+"</p>";
html+="<p><b>Package ID:</b> "+data.id+"</p>";
html+="<p><b>Date:</b> "+data.date+"</p>";
html+="<p><b>Furniture:</b> "+data.furniture+"</p>";
html+="<p><b>Component:</b> "+data.component+"</p>";
html+="<p><b>Unit:</b> "+data.unit+"</p>";
html+="<p><b>Quantity:</b> "+data.qty+"</p>";

let photos = [
data.photo1,
data.photo2,
data.photo3,
data.photo4,
data.photo5
];

let gallery = "";

photos.forEach(p => {

let img = convertDriveLink(p);

if(img){
gallery += `<img src="${img}" onclick="openLightbox('${img}')">`;
}

});

if(gallery){
html += "<div class='gallery'>" + gallery + "</div>";
}

document.getElementById("content").innerHTML = html;

}
catch(e){

document.getElementById("content").innerHTML="Hiba a lekérdezésnél.";

}

}

loadData();

</script>

</body>
</html>
