<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Package info</title>

<style>

body{
font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0d1117;
color:#e6edf3;
margin:0;
}

/* HEADER */

.header{
background:#161b22;
padding:14px 20px;
font-size:18px;
font-weight:600;
border-bottom:1px solid #30363d;
}

/* CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:25px;
}

/* CARD */

.card{
background:#161b22;
border:1px solid #30363d;
border-radius:10px;
padding:24px;
margin-bottom:20px;
}

/* INFO GRID */

.info{
display:grid;
grid-template-columns:200px 1fr;
row-gap:10px;
font-size:15px;
}

.label{
color:#8b949e;
}

.value{
font-weight:500;
}

/* GALLERY */

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(200px,1fr));
gap:14px;
margin-top:20px;
}

.gallery img{
width:100%;
border-radius:8px;
cursor:pointer;
transition:transform .15s;
}

.gallery img:hover{
transform:scale(1.03);
}

/* LIGHTBOX */

.lightbox{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(0,0,0,0.9);
display:none;
align-items:center;
justify-content:center;
}

.lightbox img{
max-width:90%;
max-height:90%;
border-radius:8px;
}

</style>

</head>

<body>

<div class="header">
📦 Package Viewer
</div>

<div class="container">

<div class="card">

<div id="content">
Loading...
</div>

</div>

</div>

<div class="lightbox" id="lightbox" onclick="closeLightbox()">
<img id="lightboxImg">
</div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbxVCRizgW3QG3x0eMRjwOVX2aioyc6wFOhJQ-_93_ClDF59jie3U-C1POeX6joLnFKm/exec";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");


function convertDriveLink(url){

if(!url) return "";

let fileId="";

let m1=url.match(/id=([^&]+)/);
if(m1) fileId=m1[1];

let m2=url.match(/\/d\/([^\/]+)/);
if(!fileId && m2) fileId=m2[1];

if(fileId){
return "https://lh3.googleusercontent.com/d/"+fileId;
}

return "";

}


function openLightbox(src){
document.getElementById("lightboxImg").src=src;
document.getElementById("lightbox").style.display="flex";
}

function closeLightbox(){
document.getElementById("lightbox").style.display="none";
}


async function loadData(){

if(!id){
document.getElementById("content").innerHTML="Missing ID";
return;
}

const response=await fetch(SCRIPT_URL+"?id="+id);
const data=await response.json();

if(data.error){
document.getElementById("content").innerHTML="Package not found";
return;
}

let html="";

html+=`
<div class="info">
<div class="label">Master Package</div><div class="value">${data.master_package_id||"-"}</div>
<div class="label">Package ID</div><div class="value">${data.id}</div>
<div class="label">Date</div><div class="value">${data.date}</div>
<div class="label">Furniture</div><div class="value">${data.furniture}</div>
<div class="label">Component</div><div class="value">${data.component}</div>
<div class="label">Unit</div><div class="value">${data.unit}</div>
<div class="label">Quantity</div><div class="value">${data.qty}</div>
</div>
`;

let photos=[
data.photo1,
data.photo2,
data.photo3,
data.photo4,
data.photo5
];

let gallery="";

photos.forEach(p=>{

let img=convertDriveLink(p);

if(img){
gallery+=`<img src="${img}" onclick="openLightbox('${img}')">`;
}

});

if(gallery){
html+=`<div class="gallery">${gallery}</div>`;
}

document.getElementById("content").innerHTML=html;

}

loadData();

</script>

</body>
</html>
