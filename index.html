<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<style>
body{
font-family:Arial;
background:#f5f5f5;
padding:40px;
}

.card{
background:white;
padding:20px;
border-radius:10px;
max-width:500px;
box-shadow:0 0 10px rgba(0,0,0,0.1);
}
</style>

</head>

<body>

<div class="card">
<h2>Furniture info</h2>
<div id="content">Betöltés...</div>
</div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycbzEZ7XTu06ejB4AeS_Q-esWeiGokVJrlPCobWii-rZhW83Jpi7GV4f8WgE8aMnxXB0S/exec";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

if(!id){
document.getElementById("content").innerHTML="Nincs ID paraméter.";
}
else{

fetch(SCRIPT_URL + "?id=" + id)
.then(response => response.json())
.then(data => {

document.getElementById("content").innerHTML = `
<b>ID:</b> ${data.id}<br><br>
<b>Furniture:</b> ${data.furniture}<br><br>
<b>Component:</b> ${data.component}<br><br>
<b>Unit:</b> ${data.unit}<br><br>
<b>Quantity:</b> ${data.qty}
`;

})
.catch(err=>{
document.getElementById("content").innerHTML="Hiba a lekérdezésnél.";
});

}

</script>

</body>
</html>
