<!DOCTYPE html>
<html>
<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Package info</title>

<style>

body{
font-family:Arial;
padding:20px;
background:#f5f5f5;
}

.card{
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 2px 8px rgba(0,0,0,0.2);
max-width:500px;
margin:auto;
}

img{
width:100%;
max-width:400px;
margin-top:10px;
border-radius:6px;
}

</style>

</head>

<body>

<div class="card">

<h2>Package info</h2>

<div id="content">
Betöltés...
</div>

</div>

<script>

const SCRIPT_URL =
"https://script.google.com/macros/s/AKfycby1fNZ5dc3UVb8rvjUIXcB920HrTzEcZR7hp7L7EjBB1LSbpwMkdu3W6LrYoJiNRvzk/exec";

const params = new URLSearchParams(window.location.search);
const id = params.get("id");

async function loadData(){

if(!id){
document.getElementById("content").innerHTML =
"Hiányzik a Package ID.";
return;
}

try{

const response = await fetch(SCRIPT_URL + "?id=" + encodeURIComponent(id));
const data = await response.json();

if(data.error){
document.getElementById("content").innerHTML =
"Nincs találat a rekordra.";
return;
}

let html = "";

html += "<p><b>Master Package ID:</b> " + (data.master_package_id || "-") + "</p>";
html += "<p><b>Package ID:</b> " + data.id + "</p>";
html += "<p><b>Date:</b> " + data.date + "</p>";
html += "<p><b>Furniture:</b> " + data.furniture + "</p>";
html += "<p><b>Component:</b> " + data.component + "</p>";
html += "<p><b>Unit:</b> " + data.unit + "</p>";
html += "<p><b>Quantity:</b> " + data.qty + "</p>";

if(data.photo1) html += "<img src='"+data.photo1+"'>";
if(data.photo2) html += "<img src='"+data.photo2+"'>";
if(data.photo3) html += "<img src='"+data.photo3+"'>";
if(data.photo4) html += "<img src='"+data.photo4+"'>";
if(data.photo5) html += "<img src='"+data.photo5+"'>";

document.getElementById("content").innerHTML = html;

}
catch(err){

document.getElementById("content").innerHTML =
"Hiba a lekérdezésnél.";

}

}

loadData();

</script>

</body>
</html>
