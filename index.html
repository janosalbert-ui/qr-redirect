<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Package info</title>

<style>

body{
font-family:system-ui;
background:#0d1117;
color:#e6edf3;
margin:0;
}

.header{
background:#161b22;
padding:14px 20px;
font-size:18px;
font-weight:600;
border-bottom:1px solid #30363d;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#161b22;
border:1px solid #30363d;
border-radius:10px;
padding:20px;
}

.infoRow{
margin-bottom:14px;
}

.label{
color:#8b949e;
font-size:13px;
}

.value{
font-size:16px;
font-weight:500;
word-break:break-word;
}

.gallery{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(160px,1fr));
gap:12px;
margin-top:20px;
}

.gallery img{
width:100%;
border-radius:8px;
cursor:pointer;
}

</style>

</head>

<body>

<div class="header">
📦 Package Viewer
</div>

<div class="container">

<div class="card">

<div id="content">
Loading...
</div>

</div>

</div>

<script>

const SCRIPT_URL="https://script.google.com/macros/s/AKfycbxVCRizgW3QG3x0eMRjwOVX2aioyc6wFOhJQ-_93_ClDF59jie3U-C1POeX6joLnFKm/exec";

const params=new URLSearchParams(window.location.search);
const id=params.get("id");

async function loadData(){

const response=await fetch(SCRIPT_URL+"?id="+id);
const data=await response.json();

let html="";

html+=`
<div class="infoRow">
<div class="label">Master</div>
<div class="value">${data.master_package_id}</div>
</div>

<div class="infoRow">
<div class="label">Package ID</div>
<div class="value">${data.id}</div>
</div>

<div class="infoRow">
<div class="label">Furniture</div>
<div class="value">${data.furniture}</div>
</div>

<div class="infoRow">
<div class="label">Component</div>
<div class="value">${data.component}</div>
</div>

<div class="infoRow">
<div class="label">Quantity</div>
<div class="value">${data.qty}</div>
</div>
`;

document.getElementById("content").innerHTML=html;

}

loadData();

</script>

</body>
</html>
