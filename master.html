<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Master Manager</title>

<style>

body{
font-family:system-ui;
background:#0d1117;
color:white;
margin:0;
padding:30px;
display:flex;
justify-content:center;
}

.card{
background:#161b22;
border-radius:12px;
padding:25px;
width:100%;
max-width:420px;
text-align:center;
}

h2{
margin-top:0;
}

.statusBox{
margin-bottom:20px;
padding:12px;
border-radius:8px;
background:#0b2239;
font-size:16px;
}

.active{
color:#58a6ff;
font-weight:bold;
}

input{
width:100%;
padding:14px;
font-size:18px;
border-radius:8px;
border:none;
margin-top:15px;
text-align:center;
box-sizing:border-box;
}

button{
width:100%;
padding:14px;
margin-top:15px;
font-size:16px;
border:none;
border-radius:8px;
cursor:pointer;
}

.open{
background:#2ea043;
color:white;
}

.close{
background:#da3633;
color:white;
}

.log{
margin-top:15px;
font-size:13px;
color:#8b949e;
word-break:break-word;
}

</style>

</head>

<body>

<div class="card">

<h2>Master Manager</h2>

<div class="statusBox">
ACTIVE MASTER:<br>
<span id="activeMaster" class="active">loading...</span>
</div>

<input id="master" placeholder="Master ID (pl. 401 vagy CAB1)">

<button class="open" onclick="openMaster()">OPEN MASTER</button>

<button class="close" onclick="closeMaster()">CLOSE MASTER</button>

<div id="log" class="log"></div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxVCRizgW3QG3x0eMRjwOVX2aioyc6wFOhJQ-_93_ClDF59jie3U-C1POeX6joLnFKm/exec";

function log(txt){
document.getElementById("log").innerText=txt;
}

async function loadStatus(){

try{

let form=new FormData();
form.append("action","status");

let r=await fetch(API,{
method:"POST",
body:form
});

let data=await r.json();

if(data.active){
document.getElementById("activeMaster").innerText=data.active;
}else{
document.getElementById("activeMaster").innerText="none";
}

}
catch(e){

document.getElementById("activeMaster").innerText="error";

}

}

async function openMaster(){

let master=document.getElementById("master").value.trim();

if(!master){
alert("Adj meg Master ID-t");
return;
}

let form=new FormData();
form.append("action","open");
form.append("master",master);

let r=await fetch(API,{
method:"POST",
body:form
});

let data=await r.json();

log(JSON.stringify(data,null,2));

loadStatus();

}

async function closeMaster(){

let active=document.getElementById("activeMaster").innerText;

if(!active || active==="none"){
alert("Nincs aktív Master");
return;
}

let confirmClose=confirm("Biztos lezárod a Master-t?\n\nMASTER: "+active);

if(!confirmClose) return;

let form=new FormData();
form.append("action","close");

let r=await fetch(API,{
method:"POST",
body:form
});

let data=await r.json();

log(JSON.stringify(data,null,2));

loadStatus();

}

loadStatus();

</script>

</body>
</html>
