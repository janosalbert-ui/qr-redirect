<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Master Manager</title>

<style>

/* BASE */

body{
font-family:system-ui, Inter;
background:#0d1117;
color:#e6edf3;
margin:0;
}

/* HEADER */

.header{
background:#161b22;
border-bottom:1px solid #30363d;
padding:14px;
text-align:center;
position:sticky;
top:0;
}

.brandTitle{
font-weight:600;
font-size:16px;
}

.brandSub{
font-size:12px;
color:#8b949e;
}

/* LAYOUT */

.container{
max-width:420px;
margin:auto;
padding:15px;
}

/* CARD */

.card{
background:#161b22;
border:1px solid #30363d;
border-radius:16px;
padding:18px;
}

/* STATUS */

.statusBox{
margin-bottom:15px;
padding:16px;
border-radius:12px;
background:#0b2239;
font-size:18px;
font-weight:700;
}

/* INPUT */

input, select{
width:100%;
padding:14px;
font-size:18px;
border-radius:12px;
margin-top:10px;
margin-bottom:10px;
background:#0d1117;
color:white;
border:1px solid #30363d;
box-sizing:border-box;
}

/* BUTTON BASE */

button{
width:100%;
height:55px;
font-size:18px;
border-radius:14px;
cursor:pointer;
margin-top:10px;

background:#1f2933;
color:#e6edf3;
border:1px solid #30363d;

transition:all 0.15s ease;
}

button:active{
transform:scale(0.97);
}

button:hover{
background:#273341;
}

/* ACTION COLORS (FINOM KIEMELÉS) */

.open{
border-left:4px solid #3fb950;
}

.continue{
border-left:4px solid #58a6ff;
}

.close{
border-left:4px solid #f85149;
}

/* LOADING */

.loadingOverlay{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
background:rgba(13,17,23,0.92);
display:none;
align-items:center;
justify-content:center;
z-index:9999;
}

.loaderBox{
width:70px;
height:70px;
border:4px solid #30363d;
border-top:4px solid #2ea043;
border-radius:12px;
animation:spinBox 1s linear infinite;
}

@keyframes spinBox{
0%{transform:rotate(0deg);}
100%{transform:rotate(360deg);}
}

/* MOBILE */

@media(max-width:600px){

.statusBox{
font-size:17px;
}

}

</style>

</head>

<body>

<div class="header">
<div class="brandTitle">Inser Home</div>
<div class="brandSub">Packing System</div>
</div>

<div class="container">

<div class="card">

<div class="statusBox">
<span id="activeMaster">Loading...</span>
</div>

<input id="group" list="groupList" placeholder="Group (opcionális)">
<datalist id="groupList"></datalist>

<button class="open" onclick="openMaster()">OPEN NEW MASTER</button>

<select id="masterSelect"></select>

<button class="continue" onclick="continueMaster()">CONTINUE MASTER</button>

<button class="close" onclick="closeMaster()">CLOSE MASTER</button>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxVCRizgW3QG3x0eMRjwOVX2aioyc6wFOhJQ-_93_ClDF59jie3U-C1POeX6joLnFKm/exec";

/* LOADER */

function showLoading(){
document.getElementById("loading").style.display="flex";
}

function hideLoading(){
document.getElementById("loading").style.display="none";
}

/* API */

async function apiCall(form){
showLoading();
let r = await fetch(API,{method:"POST",body:form});
let data = await r.json();
hideLoading();
return data;
}

/* STATUS */

async function loadStatus(){

try{

let form=new FormData();
form.append("action","status");

let r=await fetch(API,{method:"POST",body:form});
let data=await r.json();

if(data.active){

let text="🟢 MASTER "+data.active;

if(data.group){
text+="<br><span style='font-size:14px;color:#8b949e'>GROUP: "+data.group+"</span>";
}

document.getElementById("activeMaster").innerHTML=text;

}else{

document.getElementById("activeMaster").innerHTML="🔴 NO MASTER OPEN";

}

}catch(err){

document.getElementById("activeMaster").innerHTML="❌ STATUS ERROR";

}

}

/* GROUPS */

async function loadGroups(){

try{

let r = await fetch(API+"?groups=1");
let data = await r.json();

let list = document.getElementById("groupList");
list.innerHTML="";

if(!data.groups) return;

data.groups.forEach(function(g){
let option=document.createElement("option");
option.value=g;
list.appendChild(option);
});

}catch(err){
console.log("Group lista nem elérhető");
}

}

/* OPEN */

async function openMaster(){

let group = document.getElementById("group").value.trim();

let form = new FormData();
form.append("action","open");
form.append("group",group);

let data = await apiCall(form);

if(data.status === "error"){
alert(data.message);
return;
}

let master = data.master;

loadStatus();
loadGroups();
loadMasters();

window.open("print.html?id="+master,"_blank");

}

/* CLOSE */

async function closeMaster(){

let active=document.getElementById("activeMaster").innerText;

if(!active.includes("MASTER")){
alert("Nincs aktív Master");
return;
}

let form=new FormData();
form.append("action","close");

await apiCall(form);

loadStatus();
loadMasters();

}

/* MASTER LIST */

async function loadMasters(){

try{

const r = await fetch(API + "?masters=1&nocache=" + new Date().getTime());
const data = await r.json();

const select = document.getElementById("masterSelect");
select.innerHTML = "";

if(!data.masters) return;

let form = new FormData();
form.append("action","status");

const statusRes = await fetch(API,{method:"POST",body:form});
const status = await statusRes.json();

const lastMaster = String(status.last || status.active || "");

let list = data.masters.filter(m => m != lastMaster);

if(lastMaster){
list.unshift(lastMaster);
}

list.forEach(m => {
const opt = document.createElement("option");
opt.value = m;
opt.textContent = "MASTER " + m;
select.appendChild(opt);
});

}catch(err){
console.log("Master lista nem elérhető");
}

}

/* CONTINUE */

async function continueMaster(){

const master = document.getElementById("masterSelect").value;

if(!master){
alert("Válassz Mastert");
return;
}

let form = new FormData();
form.append("action","open");
form.append("master", master);

let data = await apiCall(form);

if(data.status === "error"){
alert(data.message);
return;
}

alert("MASTER " + master + " megnyitva");

loadStatus();
loadMasters();

}

/* INIT */

loadStatus();
loadGroups();
loadMasters();

</script>

<div id="loading" class="loadingOverlay">
<div class="loaderBox"></div>
</div>

</body>
</html>
