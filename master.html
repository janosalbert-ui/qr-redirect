<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Master Manager</title>

<style>

body{
font-family:Inter,system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto;
background:#0d1117;
color:#e6edf3;
margin:0;
}

/* HEADER */

.header{
background:#161b22;
border-bottom:1px solid #30363d;
padding:14px 20px;
display:flex;
align-items:center;
gap:12px;
}

.logo{
height:32px;
}

.brand{
display:flex;
flex-direction:column;
}

.brandTitle{
font-weight:600;
font-size:15px;
}

.brandSub{
font-size:12px;
color:#8b949e;
}

/* LAYOUT */

.container{
max-width:900px;
margin:auto;
padding:30px 20px;
display:flex;
justify-content:center;
}

.card{
background:#161b22;
border:1px solid #30363d;
border-radius:12px;
padding:25px;
width:100%;
max-width:420px;
text-align:center;
}

/* STATUS */

.statusBox{
margin-bottom:20px;
padding:12px;
border-radius:8px;
background:#0b2239;
font-size:16px;
}

.active{
color:#58a6ff;
font-weight:bold;
}

/* INPUT */

input{
width:100%;
padding:14px;
font-size:18px;
border-radius:8px;
border:none;
margin-top:15px;
text-align:center;
box-sizing:border-box;
background:#0d1117;
color:white;
border:1px solid #30363d;
}

/* BUTTONS */

button{
width:100%;
padding:14px;
margin-top:15px;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
}

.open{
background:#2ea043;
color:white;
}

.close{
background:#da3633;
color:white;
}

/* LOG */

.log{
margin-top:15px;
font-size:13px;
color:#8b949e;
word-break:break-word;
text-align:left;
}

</style>

</head>

<body>

<div class="header">

<img src="logo.png" class="logo">

<div class="brand">
<div class="brandTitle">Inser Home</div>
<div class="brandSub">Packing System</div>
</div>

</div>

<div class="container">

<div class="card">

<h2>📦 Master Manager</h2>

<div class="statusBox">
ACTIVE MASTER:<br>
<span id="activeMaster" class="active">loading...</span>
</div>

<input id="master" placeholder="Master ID (pl. 401 vagy CAB1)">

<button class="open" onclick="openMaster()">OPEN MASTER</button>

<button class="close" onclick="closeMaster()">CLOSE MASTER</button>

<div id="log" class="log"></div>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxVCRizgW3QG3x0eMRjwOVX2aioyc6wFOhJQ-_93_ClDF59jie3U-C1POeX6joLnFKm/exec";

function log(txt){
document.getElementById("log").innerText=txt;
}

async function loadStatus(){

try{

let form=new FormData();
form.append("action","status");

let r=await fetch(API,{
method:"POST",
body:form
});

let data=await r.json();

if(data.active){
document.getElementById("activeMaster").innerText=data.active;
}else{
document.getElementById("activeMaster").innerText="none";
}

}
catch(e){

document.getElementById("activeMaster").innerText="error";

}

}

async function openMaster(){

let master=document.getElementById("master").value.trim();

if(!master){
alert("Adj meg Master ID-t");
return;
}

let form=new FormData();
form.append("action","open");
form.append("master",master);

let r=await fetch(API,{
method:"POST",
body:form
});

let data=await r.json();

log(JSON.stringify(data,null,2));

loadStatus();

/* QR PRINT PAGE AUTOMATIKUS MEGNYITÁSA */

window.open("print.html?id="+master,"_blank");

}

async function closeMaster(){

let active=document.getElementById("activeMaster").innerText;

if(!active || active==="none"){
alert("Nincs aktív Master");
return;
}

let confirmClose=confirm("Biztos lezárod a Master-t?\n\nMASTER: "+active);

if(!confirmClose) return;

let form=new FormData();
form.append("action","close");

let r=await fetch(API,{
method:"POST",
body:form
});

let data=await r.json();

log(JSON.stringify(data,null,2));

loadStatus();

}

loadStatus();

</script>

</body>
</html>
