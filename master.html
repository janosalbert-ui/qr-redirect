<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Master Manager</title>

<style>

body{
font-family:Inter,system-ui;
background:#0d1117;
color:#e6edf3;
margin:0;
}

/* HEADER */

.header{
background:#161b22;
border-bottom:1px solid #30363d;
padding:16px 20px;
display:flex;
justify-content:center;
}

.brandTitle{
font-weight:600;
font-size:16px;
}

.brandSub{
font-size:12px;
color:#8b949e;
text-align:center;
}

/* LAYOUT */

.container{
max-width:900px;
margin:auto;
padding:30px 20px;
display:flex;
justify-content:center;
}

.card{
background:#161b22;
border:1px solid #30363d;
border-radius:12px;
padding:25px;
width:100%;
max-width:420px;
text-align:center;
}

.statusBox{
margin-bottom:20px;
padding:16px;
border-radius:10px;
background:#0b2239;
font-size:18px;
font-weight:600;
}

input{
width:100%;
padding:14px;
font-size:18px;
border-radius:8px;
margin-top:15px;
text-align:center;
box-sizing:border-box;
background:#0d1117;
color:white;
border:1px solid #30363d;
}

button{
width:100%;
padding:14px;
margin-top:15px;
font-size:16px;
border:none;
border-radius:10px;
cursor:pointer;
}

.open{
background:#2ea043;
color:white;
}

.close{
background:#da3633;
color:white;
}

</style>

</head>

<body>

<div class="header">

<div>
<div class="brandTitle">Inser Home</div>
<div class="brandSub">Packing System</div>
</div>

</div>

<div class="container">

<div class="card">

<h2>📦 Master Manager</h2>

<div class="statusBox">
<span id="activeMaster">Loading...</span>
</div>

<input id="group" list="groupList" placeholder="Group (opcionális)">
<datalist id="groupList"></datalist>

<button class="open" onclick="openMaster()">OPEN MASTER</button>

<button class="close" onclick="closeMaster()">CLOSE MASTER</button>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxVCRizgW3QG3x0eMRjwOVX2aioyc6wFOhJQ-_93_ClDF59jie3U-C1POeX6joLnFKm/exec";

/* STATUS BETÖLTÉSE */

async function loadStatus(){

let form=new FormData();
form.append("action","status");

let r=await fetch(API,{method:"POST",body:form});
let data=await r.json();

if(data.active){

let text="🟢 MASTER "+data.active+" OPEN";

if(data.group){
text+="<br><span style='font-size:14px;color:#8b949e'>GROUP: "+data.group+"</span>";
}

document.getElementById("activeMaster").innerHTML=text;

}else{

document.getElementById("activeMaster").innerHTML=
"🔴 NO MASTER OPEN";

}

}

/* GROUP LISTA BETÖLTÉSE */

async function loadGroups(){

try{

let r = await fetch(API+"?groups=1");
let data = await r.json();

let list = document.getElementById("groupList");
list.innerHTML="";

if(!data.groups) return;

data.groups.forEach(function(g){

let option=document.createElement("option");
option.value=g;

list.appendChild(option);

});

}catch(err){

console.log("Group lista nem elérhető");

}

}

/* MASTER NYITÁSA */

async function openMaster(){

let group=document.getElementById("group").value.trim();

let form=new FormData();
form.append("action","open");
form.append("group",group);

/* SERVER HÍVÁS */

let res = await fetch(API,{method:"POST",body:form});
let data = await res.json();

/* ÚJ MASTER ID */

let master = data.master;

loadStatus();
loadGroups();

/* QR NYOMTATÁS */

window.open("print.html?id="+master,"_blank");

}

/* MASTER ZÁRÁSA */

async function closeMaster(){

let active=document.getElementById("activeMaster").innerText;

if(!active.includes("MASTER")){
alert("Nincs aktív Master");
return;
}

let form=new FormData();
form.append("action","close");

await fetch(API,{method:"POST",body:form});

loadStatus();

}

/* OLDAL BETÖLTÉS */

loadStatus();
loadGroups();

</script>

</body>
</html>
