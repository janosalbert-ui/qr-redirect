<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Master QR</title>

<style>

body{
font-family:Inter,system-ui;
background:white;
color:black;
text-align:center;
padding:40px;
margin:0;
}

/* HEADER */

.header{
display:flex;
justify-content:center;
align-items:center;
margin-bottom:30px;
flex-direction:column;
}

.brandTitle{
font-size:20px;
font-weight:700;
}

.brandSub{
font-size:14px;
color:#666;
}

/* TITLE */

.master{
font-size:42px;
font-weight:800;
margin-top:30px;
margin-bottom:10px;
}

.subtitle{
font-size:16px;
color:#666;
margin-bottom:30px;
}

/* QR */

.qr{
display:flex;
justify-content:center;
}

.qr img{
width:320px;
height:320px;
}

/* BUTTON */

button{
margin-top:40px;
padding:16px 30px;
font-size:16px;
border:none;
background:black;
color:white;
border-radius:10px;
cursor:pointer;
}

/* PRINT MODE */

@media print{

button{
display:none;
}

body{
padding:0;
}

}

</style>

</head>

<body>

<div class="header">

<div class="brandTitle">Inser Home</div>
<div class="brandSub">Packing System</div>

</div>

<div id="masterTitle" class="master"></div>

<div class="subtitle">
SCAN TO OPEN BOX CONTENT
</div>

<div class="qr">
<img id="qr">
</div>

<button onclick="window.print()">PRINT LABEL</button>

<script>

const params=new URLSearchParams(window.location.search);
const master=params.get("id");

document.getElementById("masterTitle").innerText="MASTER "+master;

const targetURL="https://janosalbert-ui.github.io/qr-redirect/box.html?id="+master;

const qr="https://api.qrserver.com/v1/create-qr-code/?size=400x400&data="+encodeURIComponent(targetURL);

document.getElementById("qr").src=qr;

</script>

</body>
</html>
