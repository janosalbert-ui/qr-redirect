<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Master Package</title>

<style>

/* BASE */

body{
font-family:system-ui;
background:#0d1117;
color:#e6edf3;
margin:0;
}

/* HEADER */

.header{
position:sticky;
top:0;
background:#161b22;
padding:14px;
font-size:16px;
font-weight:600;
border-bottom:1px solid #30363d;
text-align:center;
}

/* CONTAINER */

.container{
max-width:900px;
margin:auto;
padding:15px;
}

/* MASTER BLOCK */

.masterBox{
background:#161b22;
border:1px solid #30363d;
border-radius:16px;
padding:18px;
margin-bottom:15px;
}

.masterTitle{
font-size:26px;
font-weight:800;
}

.masterSub{
color:#8b949e;
margin-top:4px;
}

/* CARD */

.card{
background:#161b22;
border:1px solid #30363d;
border-radius:16px;
padding:18px;
margin-bottom:12px;
cursor:pointer;
transition:all 0.15s ease;
}

.card:active{
transform:scale(0.98);
}

.card:hover{
border-color:#2ea043;
}

/* TEXT */

.pkgId{
font-size:20px;
font-weight:700;
margin-bottom:4px;
}

.pkgSub{
color:#8b949e;
font-size:14px;
}

.qty{
margin-top:8px;
font-size:20px;
font-weight:800;
color:#2ea043;
}

/* EMPTY */

.empty{
color:#8b949e;
margin-top:20px;
text-align:center;
font-size:16px;
}

/* MOBILE BOOST */

@media(max-width:600px){

.card{
padding:20px;
}

.pkgId{
font-size:22px;
}

.qty{
font-size:22px;
}

}

</style>

</head>

<body>

<div class="header">
📦 Master Package
</div>

<div class="container" id="list">
Loading...
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxVCRizgW3QG3x0eMRjwOVX2aioyc6wFOhJQ-_93_ClDF59jie3U-C1POeX6joLnFKm/exec";

const params=new URLSearchParams(window.location.search);
const master=params.get("id");

/* 🔥 LIVE STATE */
let lastCount = -1;

async function load(){

if(!master){
document.getElementById("list").innerHTML="❌ Missing master ID";
return;
}

const r=await fetch(API+"?packages=1&master="+master);
const data=await r.json();

if(!data.packages) return;

/* 🔥 csak ha változott */
if(data.packages.length === lastCount){
return;
}

lastCount = data.packages.length;

let html=`
<div class="masterBox">
<div class="masterTitle">MASTER ${data.master}</div>
<div class="masterSub">Package list</div>
</div>
`;

if(data.packages.length===0){

html+=`<div class="empty">No packages yet</div>`;

}else{

data.packages.forEach(p=>{

html+=`
<div class="card" onclick="openPackage('${p.id}')">

<div class="pkgId">${p.id}</div>

<div class="pkgSub">
${p.furniture}<br>
${p.component}
</div>

<div class="qty">QTY: ${p.qty}</div>

</div>
`;

});

}

document.getElementById("list").innerHTML=html;

}

function openPackage(id){
window.location="index.html?id="+id;
}

/* INIT */
load();

/* 🔥 AUTO REFRESH */
setInterval(load, 3000);

</script>

</body>
</html>
