<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Master Package</title>

<style>

body{
font-family:system-ui;
background:#0d1117;
color:#e6edf3;
margin:0;
}

.header{
background:#161b22;
padding:14px 20px;
font-size:18px;
font-weight:600;
border-bottom:1px solid #30363d;
text-align:center;
}

.container{
max-width:900px;
margin:auto;
padding:20px;
}

.card{
background:#161b22;
border:1px solid #30363d;
border-radius:10px;
padding:20px;
margin-bottom:15px;
cursor:pointer;
}

.card:hover{
border-color:#58a6ff;
}

.empty{
color:#8b949e;
margin-top:20px;
text-align:center;
}

</style>

</head>

<body>

<div class="header">
📦 Master Package
</div>

<div class="container" id="list">
Loading...
</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxVCRizgW3QG3x0eMRjwOVX2aioyc6wFOhJQ-_93_ClDF59jie3U-C1POeX6joLnFKm/exec";

const params=new URLSearchParams(window.location.search);
const master=params.get("id");

async function load(){

const r=await fetch(API+"?master="+master);
const data=await r.json();

let html=`<h2>MASTER ${data.master}</h2>`;

if(data.packages.length===0){

html+=`<div class="empty">No packages yet</div>`;

}else{

data.packages.forEach(p=>{

html+=`
<div class="card" onclick="openPackage('${p.id}')">
<b>${p.id}</b><br>
${p.furniture} / ${p.component} (${p.qty})
</div>
`;

});

}

document.getElementById("list").innerHTML=html;

}

function openPackage(id){

window.location="index.html?id="+id;

}

load();

</script>

</body>
</html>
