<!DOCTYPE html>
<html>

<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Master Box</title>

<link rel="stylesheet" href="style.css">

</head>

<body>

<div class="header">

<img src="logo.png" class="logo">

<div class="brand">
<div class="brandTitle">Inser Home</div>
<div class="brandSub">Packing System</div>
</div>

</div>

<div class="container">

<div class="card">

<div id="content">
Loading...
</div>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxVCRizgW3QG3x0eMRjwOVX2aioyc6wFOhJQ-_93_ClDF59jie3U-C1POeX6joLnFKm/exec";

const params=new URLSearchParams(window.location.search);
const master=params.get("id");

async function load(){

let r=await fetch(API+"?master="+master);
let data=await r.json();

let html="";

html+=`<div class="masterTitle">📦 MASTER ${data.master}</div>`;
html+=`<div class="masterMeta">${data.packages.length} packages</div>`;

data.packages.forEach(p=>{

html+=`
<div class="item" onclick="openPackage('${p.id}')">

<div class="itemTitle">${p.id}</div>

<div class="itemMeta">
${p.furniture} / ${p.component} (${p.qty})
</div>

</div>
`;

});

document.getElementById("content").innerHTML=html;

}

function openPackage(id){
window.location.href="index.html?id="+id;
}

load();

</script>

</body>
</html>
