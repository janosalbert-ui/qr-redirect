<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Packing Dashboard</title>

<style>

/* BASE */

body{
font-family:system-ui;
background:#0d1117;
color:#e6edf3;
margin:0;
}

/* HEADER */

.header{
background:#161b22;
border-bottom:1px solid #30363d;
padding:14px;
text-align:center;
position:sticky;
top:0;
}

.brandTitle{
font-weight:600;
font-size:16px;
}

.brandSub{
font-size:12px;
color:#8b949e;
}

/* CONTAINER */

.container{
max-width:500px;
margin:auto;
padding:15px;
}

/* STATS */

.grid{
display:grid;
grid-template-columns:1fr 1fr;
gap:12px;
margin-bottom:20px;
}

.card{
background:#161b22;
border:1px solid #30363d;
border-radius:16px;
padding:18px;
text-align:center;
}

.label{
color:#8b949e;
font-size:13px;
}

.value{
font-size:28px;
font-weight:800;
margin-top:6px;
}

/* ACTION BUTTONS */

.buttons{
display:flex;
flex-direction:column;
gap:10px;
}

button{
height:60px;
font-size:18px;
border:none;
border-radius:14px;
cursor:pointer;
background:#2ea043;
color:white;
}

/* SECONDARY */

button.secondary{
background:#30363d;
}

/* HOVER */

button:active{
transform:scale(0.97);
}

/* MOBILE BOOST */

@media(max-width:600px){

.value{
font-size:26px;
}

}

</style>

</head>

<body>

<div class="header">
<div class="brandTitle">Inser Home</div>
<div class="brandSub">Packing System</div>
</div>

<div class="container">

<!-- STATS -->

<div class="grid">

<div class="card">
<div class="label">Total Packages</div>
<div id="packages" class="value">...</div>
</div>

<div class="card">
<div class="label">Active Master</div>
<div id="master" class="value">...</div>
</div>

</div>

<!-- ACTIONS -->

<div class="buttons">

<button onclick="location='master.html'">
📦 Master Manager
</button>

<button class="secondary" onclick="openForm()">
📝 Open Form
</button>

<button onclick="openBox()">
📋 View Active Master
</button>

<button onclick="printPacking()">
🖨️ Print Packing List
</button>

<button onclick="printLast()">
🧾 Last Package Label
</button>

<button class="secondary" onclick="location.reload()">
🔄 Refresh
</button>

</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxVCRizgW3QG3x0eMRjwOVX2aioyc6wFOhJQ-_93_ClDF59jie3U-C1POeX6joLnFKm/exec";

let currentGroup = "";

/* STATUS */

async function loadStatus(){

let form=new FormData();
form.append("action","status");

let r=await fetch(API,{
method:"POST",
body:form
});

let data=await r.json();

document.getElementById("master").innerText=data.active || "None";

currentGroup = data.group || "";

}

/* PACKAGES */

async function loadPackages(){

try{

const r=await fetch(API+"?stats=1");
const data=await r.json();

document.getElementById("packages").innerText=data.totalPackages;

}catch{

document.getElementById("packages").innerText="?";

}

}

/* FORM */

function openForm(){
window.open("https://docs.google.com/forms/d/1nYzTfbuf3Le7rWJVCKsHVDv9U_qvseppHf-Y_6S1moE","_blank");
}

/* OPEN MASTER */

function openBox(){

let master=document.getElementById("master").innerText;

if(master==="None"){
alert("No master open");
return;
}

window.location="box.html?id="+master;

}

/* PRINT PACKING */

function printPacking(){
window.open("print-all.html","_blank");
}

/* PRINT LAST */

function printLast(){

fetch(API + "?last=1")
.then(r => r.json())
.then(d => {

if(d.error){
alert("No package yet");
return;
}

var url = API
+ "?label=1"
+ "&group=" + encodeURIComponent(d.group)
+ "&master=" + encodeURIComponent(d.master)
+ "&package=" + encodeURIComponent(d.package)
+ "&date=" + encodeURIComponent(d.date);

window.open(url, "_blank");

});

}

/* INIT */

loadStatus();
loadPackages();

</script>

</body>
</html>
