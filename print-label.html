<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Package Label</title>

<style>

body{
margin:0;
width:101mm;
height:54mm;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
background:white;
}

/* 👉 FONTOS: nyomtatási méret fix */
@page{
size:101mm 54mm;
margin:0;
}

.wrap{
width:101mm;
height:54mm;
display:flex;
flex-direction:row;
align-items:center;
justify-content:space-between;
padding:4mm;
box-sizing:border-box;
gap:4mm; /* 🔥 jobb térköz */
}

/* QR */

.qr{
display:flex;
align-items:center;
justify-content:center;
}

.qr img{
width:34mm;   /* 🔥 picit kisebb */
height:34mm;
}

/* TEXT */

.text{
font-size:14px;   /* 🔥 nagyobb */
line-height:1.3;
padding-left:2mm;
flex:1;
}

.big{
font-size:20px;   /* 🔥 sokkal hangsúlyosabb */
font-weight:bold;
margin-top:4px;
}

/* PRINT */

@media print{

body{
margin:0;
}

}

</style>

</head>

<div class="wrap">

<div class="qr">
<img id="qr">
</div>

<div class="text">
<div><b>Group:</b> <span id="group"></span></div>
<div><b>Master:</b> <span id="master"></span></div>
<div class="big">Package: <span id="pkg"></span></div>
<div><b>Date:</b> <span id="date"></span></div>
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxVCRizgW3QG3x0eMRjwOVX2aioyc6wFOhJQ-_93_ClDF59jie3U-C1POeX6joLnFKm/exec";

const params=new URLSearchParams(window.location.search);
const pkg=params.get("package");

async function load(){

if(!pkg){
document.body.innerHTML="Missing package ID";
return;
}

/* 👉 adat lekérés */
const r=await fetch(API+"?id="+pkg);
const d=await r.json();

/* 🔥 DÁTUM FORMÁZÓ */
function formatDate(d){
  if(!d) return "";

  let date = new Date(d);

  let day = String(date.getDate()).padStart(2,'0');
  let month = String(date.getMonth()+1).padStart(2,'0');
  let year = date.getFullYear();

  return year + "." + month + "." + day;
}

/* TEXT */

document.getElementById("pkg").innerText=d.id || pkg;
document.getElementById("master").innerText=d.master_package_id || "-";
document.getElementById("date").innerText = formatDate(d.date);

/* QR → package viewer */
const targetURL="https://janosalbert-ui.github.io/qr-redirect/index.html?id="+pkg;

const img = document.getElementById("qr");

img.src =
"https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="
+encodeURIComponent(targetURL);

/* 🔥 PRINT CSAK HA A QR IS BETÖLTÖTT */
img.onload = () => {
  window.print();
};

}

load();

</script>

</body>
</html>
