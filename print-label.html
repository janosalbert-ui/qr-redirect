<!DOCTYPE html>
<html>

<head>

<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Package Label</title>

<style>

body{
margin:0;
width:100mm;
height:100mm;
font-family:Arial;
display:flex;
justify-content:center;
align-items:center;
background:white;
}

.wrap{
width:100mm;
height:100mm;
display:flex;
flex-direction:column;
justify-content:space-between;
padding:8mm;
box-sizing:border-box;
}

/* QR */

.qr{
text-align:center;
}

.qr img{
width:60mm;
height:60mm;
}

/* TEXT */

.text{
font-size:12px;
}

.big{
font-size:16px;
font-weight:bold;
margin-top:4px;
}

/* PRINT */

@media print{
body{margin:0;}
}

</style>

</head>

<body onload="window.print()">

<div class="wrap">

<div class="qr">
<img id="qr">
</div>

<div class="text">
<div><b>Master:</b> <span id="master"></span></div>
<div class="big">Package: <span id="pkg"></span></div>
<div><b>Date:</b> <span id="date"></span></div>
</div>

</div>

<script>

const API="https://script.google.com/macros/s/AKfycbxVCRizgW3QG3x0eMRjwOVX2aioyc6wFOhJQ-_93_ClDF59jie3U-C1POeX6joLnFKm/exec";

const params=new URLSearchParams(window.location.search);
const pkg=params.get("package");

async function load(){

if(!pkg){
document.body.innerHTML="Missing package ID";
return;
}

/* 👉 adat lekérés ugyanazzal az API-val ami már működik */
const r=await fetch(API+"?id="+pkg);
const d=await r.json();

/* TEXT */

document.getElementById("pkg").innerText=d.id || pkg;
document.getElementById("master").innerText=d.master_package_id || "-";
document.getElementById("date").innerText=d.date || "";

/* QR → package viewer */
const targetURL="https://janosalbert-ui.github.io/qr-redirect/index.html?id="+pkg;

document.getElementById("qr").src=
"https://api.qrserver.com/v1/create-qr-code/?size=300x300&data="
+encodeURIComponent(targetURL);

}

load();

</script>

</body>
</html>
